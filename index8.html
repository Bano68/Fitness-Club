<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fee Collection</title>
  <link rel="stylesheet" href="style8.css">
</head>
<body>
  <div class="container">
    <h1>Fee Collection</h1>
    
    <form id="feeForm">
      <label for="phone">Member Phone:</label>
      <input type="text" id="phone" placeholder="Enter member phone" required>
      
      <label for="amount">Fee Amount:</label>
      <input type="number" id="amount" placeholder="Enter fee amount" required>
      
      <button type="submit">Generate Slip</button>
    </form>

    <p id="message"></p>

    <div id="slipContainer" class="slip hidden">
      <h2>Fee Slip</h2>
      <p><strong>Name:</strong> <span id="slipName"></span></p>
      <p><strong>Phone:</strong> <span id="slipPhone"></span></p>
      <p><strong>Date:</strong> <span id="slipDate"></span></p>
      <p><strong>Amount Paid:</strong> Rs. <span id="slipAmount"></span></p>
      <button id="saveSlip">Save Slip</button>
    </div>
  </div>

  <script src="script8.js"></script>
</body>
</html>
